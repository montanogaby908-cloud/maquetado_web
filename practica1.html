<!DOCTYPE html>
<!--Es como una etiqueta que le dice al navegador:
“Esto que vas a abrir es una página web”
Sirve para que todo funcione correctamente.-->
<html lang="en">
    <!--Es el contenedor principal donde está toda la página.
<html> → encierra todo el contenido
lang="en" → indica el idioma (en este caso, inglés)-->
<head>
    <!--Es la parte de configuración.
Aquí se guardan datos importantes de la página, pero no se muestran en pantalla.-->
    <meta charset="UTF-8">
    <!--Define el tipo de caracteres que se van a usar.
Gracias a esto puedes escribir cosas como: á, é, í, ó, ú, ñ sin problemas.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Hace que la página se adapte a diferentes pantallas.
Por ejemplo: celulares, tablets o computadores.-->
    <title>Document</title>
    <!--Es el nombre que aparece en la pestaña del navegador.
Puedes cambiarlo por cualquier título que quieras.-->
</head>
<!--Cierra la parte de configuración.-->
<body>
    <!--s la parte donde va todo lo que el usuario puede ver.
Aquí pones textos, imágenes, botones, etc.--> 
<a href="/practica8.html">Volver a la pagina principal</a>
</body>
</html>
<!--Son etiquetas de cierre:
</body> → termina el contenido visible
</html> → termina toda la estructura de la página-->
