<!DOCTYPE html>
<!--Indica que el archivo es una página HTML.-->
<html lang="en">
    <!--Es el contenedor principal de toda la página.
lang="en" → idioma inglés (puedes cambiarlo a "es" si quieres)-->
<head>
    <!--Aquí van configuraciones que no se ven en la página.-->
    <meta charset="UTF-8">
    <!--Permite usar caracteres especiales como tildes y la ñ.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Hace que la página se vea bien en celular y otros dispositivos.-->
    <title>Document</title>
    <!--Es el nombre que aparece en la pestaña del navegador.-->
</head>
<body>
    <!--Aquí va todo lo que el usuario puede ver.-->
    <ul>
        <!--Significa “lista desordenada”.
Se usa para hacer listas con viñetas (•)-->
        <li>Elemento 1</li>
        <!--Significa “elemento de la lista” (list item).
Cada <li> es un ítem de la lista.-->
        <li>Elemento 2</li>
        <li>Elemento 3</li>
    </ul>
</body>
</html>
